<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayen Ben Abdallah — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7df9b0;
    --accent2: #4fc3f7;
    --accent3: #f7c948;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --card: #15151f;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── GRID LINES ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(125,249,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(125,249,176,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--accent);
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 6rem 2.5rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(125,249,176,0.08) 0%, transparent 70%);
    top: 50%; left: 60%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
  }

  .hero-content { position: relative; z-index: 1; max-width: 900px; }

  .hero-tag {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(125,249,176,0.3);
    padding: 0.35rem 0.9rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s ease both;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  h1 span { color: var(--accent); }

  .hero-sub {
    max-width: 520px;
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-cta {
    display: flex; gap: 1rem; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    font-weight: 400;
  }
  .btn-primary:hover { background: #a0fac5; transform: translateY(-2px); }

  .btn-outline {
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

  /* ── SECTION BASE ── */
  section {
    position: relative;
    z-index: 1;
    padding: 6rem 2.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.03em;
    margin-bottom: 3rem;
    line-height: 1.1;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 2.5rem;
    max-width: 1100px;
  }

  /* ── ABOUT ── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  .about-text { color: var(--muted); font-size: 0.9rem; }
  .about-text p { margin-bottom: 1rem; }

  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.5rem;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* ── EXPERIENCE ── */
  .timeline { position: relative; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--accent), transparent);
  }

  .timeline-item {
    padding-left: 2rem;
    padding-bottom: 3rem;
    position: relative;
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.5s ease;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -4px; top: 8px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .timeline-date {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .timeline-role {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .timeline-company {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .timeline-list {
    list-style: none;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .timeline-list li {
    padding-left: 1rem;
    position: relative;
    margin-bottom: 0.35rem;
  }
  .timeline-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.7rem;
    line-height: 1.8;
  }

  /* ── PROJECTS ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2rem;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(20px);
  }
  .project-card.visible { opacity: 1; transform: translateY(0); }
  .project-card:hover { border-color: var(--accent); transform: translateY(-4px); }

  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(125,249,176,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .project-num {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    opacity: 0.5;
    margin-bottom: 1rem;
  }

  .project-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .project-type {
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .project-desc {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .project-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .tag {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
  }

  .project-links {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .project-link {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--accent);
    border: 1px solid rgba(125,249,176,0.35);
    padding: 0.35rem 0.6rem;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .project-link:hover {
    color: #0a0a0f;
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ── SKILLS ── */
  .skills-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
  }

  .skills-group-title {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }

  .skill-bar { margin-bottom: 1.2rem; }
  .skill-name {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .skill-pct { color: var(--accent); font-size: 0.7rem; }
  .skill-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .skill-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0;
    transition: width 1s ease;
  }

  .cert-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .cert-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .cert-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
    margin-top: 0.45rem;
  }
  .cert-name { color: var(--text); display: block; font-size: 0.82rem; }
  .cert-org { font-size: 0.7rem; }

  /* ── CONTACT ── */
  #contact {
    text-align: center;
    padding: 8rem 2.5rem;
  }

  .contact-tagline {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .contact-big {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: -0.04em;
    margin-bottom: 1rem;
    line-height: 1;
  }

  .contact-big a {
    color: var(--accent);
    text-decoration: none;
    display: inline-block;
    transition: letter-spacing 0.3s;
  }
  .contact-big a:hover { letter-spacing: 0.02em; }

  .contact-links {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 3rem;
    flex-wrap: wrap;
  }

  .contact-link {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: color 0.2s;
  }
  .contact-link:hover { color: var(--accent); }
  .contact-link svg { width: 14px; height: 14px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CURSOR GLOW ── */
  .cursor-glow {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(125,249,176,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    transition: left 0.1s, top 0.1s;
  }

  @media (max-width: 768px) {
    nav {
      padding: 0.9rem 1rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .nav-links {
      width: 100%;
      gap: 0.75rem 1rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
    }

    #hero {
      min-height: auto;
      padding: 8.5rem 1rem 3.5rem;
      align-items: flex-start;
    }

    .hero-glow {
      width: 360px;
      height: 360px;
      left: 70%;
      top: 22%;
    }

    .hero-tag {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      padding: 0.35rem 0.7rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.4rem, 14vw, 4.4rem);
      line-height: 0.98;
      margin-bottom: 1rem;
    }

    .hero-sub {
      max-width: 100%;
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    .hero-cta {
      width: 100%;
      gap: 0.75rem;
    }

    .hero-cta .btn {
      width: 100%;
      text-align: center;
      padding: 0.85rem 1rem;
    }

    section {
      padding: 4.5rem 1rem;
    }

    h2 {
      margin-bottom: 2rem;
      font-size: clamp(1.8rem, 9vw, 2.6rem);
    }

    .divider {
      margin: 0 1rem;
      width: auto;
    }

    .about-grid,
    .skills-wrapper {
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .about-stats {
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .stat-card,
    .project-card {
      padding: 1.25rem;
    }

    .timeline-item {
      padding-left: 1.5rem;
      padding-bottom: 2rem;
    }

    .timeline-item::before {
      left: -3px;
    }

    .timeline-role {
      font-size: 1rem;
    }

    .projects-grid {
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .project-desc,
    .about-text,
    .timeline-list,
    .cert-item {
      font-size: 0.8rem;
    }

    #contact {
      padding: 5rem 1rem;
    }

    .contact-tagline {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
    }

    .contact-links {
      margin-top: 2rem;
      gap: 1rem;
      flex-direction: column;
      align-items: center;
    }

    .contact-link {
      font-size: 0.7rem;
      justify-content: center;
    }

    footer {
      padding: 1.25rem 1rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
    }

    .cursor-glow {
      display: none;
    }
  }

  @media (max-width: 480px) {
    nav {
      padding: 0.8rem 0.85rem;
    }

    .nav-logo {
      font-size: 1rem;
    }

    .nav-links {
      gap: 0.6rem 0.8rem;
    }

    .nav-links a {
      font-size: 0.64rem;
    }

    #hero {
      padding: 8rem 0.85rem 3rem;
    }

    section,
    #contact {
      padding-left: 0.85rem;
      padding-right: 0.85rem;
    }

    .about-stats {
      grid-template-columns: 1fr;
    }

    .project-links,
    .project-tags {
      gap: 0.45rem;
    }

    .project-link,
    .tag {
      width: 100%;
      text-align: center;
    }

    .project-num,
    .project-type,
    .section-label,
    .skills-group-title {
      letter-spacing: 0.12em;
    }

    .skill-name {
      gap: 0.75rem;
      align-items: center;
    }

    .contact-big {
      line-height: 1.05;
    }

    footer {
      font-size: 0.65rem;
    }
  }
</style>
</head>
<body>

<div class="cursor-glow" id="cursorGlow"></div>

<!-- NAV -->
<nav>
  <a href="#hero" class="nav-logo">RBA.</a>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-glow"></div>
  <div class="hero-content">
    <span class="hero-tag" id="heroTag"></span>
    <h1 id="heroTitle"></h1>
    <p class="hero-sub" id="heroSubtitle"></p>
    <div class="hero-cta" id="heroCta"></div>
  </div>
</section>

<div class="divider"></div>

<!-- ABOUT -->
<section id="about">
  <p class="section-label">// 001 — About</p>
  <h2>Turning data into<br>decisions.</h2>
  <div class="about-grid">
    <div class="about-text" id="aboutText"></div>
    <div class="about-stats" id="aboutStats"></div>
  </div>
</section>

<div class="divider"></div>

<!-- EXPERIENCE -->
<section id="experience">
  <p class="section-label">// 002 — Experience</p>
  <h2>Where I've<br>worked.</h2>
  <div class="timeline" id="experienceTimeline"></div>
</section>

<div class="divider"></div>

<!-- PROJECTS -->
<section id="projects">
  <p class="section-label">// 003 — Projects</p>
  <h2>Things I've<br>built.</h2>
  <div class="projects-grid" id="projectsGrid"></div>
</section>

<div class="divider"></div>

<!-- SKILLS -->
<section id="skills">
  <p class="section-label">// 004 — Skills & Certs</p>
  <h2>My toolkit.</h2>
  <div class="skills-wrapper">
    <div>
      <div class="skills-group-title">Technical Skills</div>
      <div id="technicalSkills"></div>
    </div>

    <div>
      <div class="skills-group-title">Certifications</div>
      <div class="cert-list" id="certificationsList"></div>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- CONTACT -->
<section id="contact">
  <p class="contact-tagline">// 005 — Let's Connect</p>
  <h2 class="contact-big" style="font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.8rem,5vw,4rem); letter-spacing:-0.03em; margin-bottom:1rem;" id="contactHeading"></h2>
  <p style="color:var(--muted); font-size:0.9rem; max-width:480px; margin:0 auto 2rem;" id="contactDescription"></p>
  <a href="#" class="btn btn-primary" style="font-size:0.85rem; padding:0.9rem 2.2rem;" id="contactEmailButton"></a>
  <div class="contact-links" id="contactLinks"></div>
</section>

<!-- FOOTER -->
<footer>
  <span id="footerCopyright"></span>
  <span style="letter-spacing:0.15em;" id="footerLocation"></span>
</footer>

<script>
  // Edit the data in this object to keep the portfolio up to date.
  const portfolioData = {
    hero: {
      tag: 'Ariana, Tunisia | Available for Internships',
      titleLead: 'Rayen Ben',
      titleHighlight: 'Abdallah',
      subtitle: 'IT & Finance student at Tunis Business School. Building intelligent systems at the intersection of machine learning, data analytics, and financial technology.',
      cta: [
        { label: 'Get in Touch', href: '#contact', className: 'btn btn-primary' },
        { label: 'View Projects', href: '#projects', className: 'btn btn-outline' }
      ]
    },

  function renderHero() {
    const heroTag = document.getElementById('heroTag');
    const heroTitle = document.getElementById('heroTitle');
    const heroSubtitle = document.getElementById('heroSubtitle');
    const heroCta = document.getElementById('heroCta');
    if (!heroTag || !heroTitle || !heroSubtitle || !heroCta) return;

    heroTag.textContent = portfolioData.hero.tag;
    heroTitle.innerHTML = `${portfolioData.hero.titleLead}<br><span>${portfolioData.hero.titleHighlight}</span>`;
    heroSubtitle.textContent = portfolioData.hero.subtitle;
    heroCta.innerHTML = portfolioData.hero.cta
      .map(link => `<a href="${link.href}" class="${link.className}">${link.label}</a>`)
      .join('');
  }

  function renderAbout() {
    const aboutText = document.getElementById('aboutText');
    const aboutStats = document.getElementById('aboutStats');
    if (!aboutText || !aboutStats) return;

    aboutText.innerHTML = portfolioData.about.paragraphs
      .map(paragraph => `<p>${paragraph}</p>`)
      .join('');

    aboutStats.innerHTML = portfolioData.about.stats
      .map(stat => `
        <div class="stat-card">
          <span class="stat-num">${stat.value}</span>
          <div class="stat-label">${stat.label}</div>
        </div>
      `)
      .join('');
  }

  function renderExperience() {
    const timeline = document.getElementById('experienceTimeline');
    if (!timeline) return;

    timeline.innerHTML = portfolioData.experience.map(item => {
      const highlights = item.highlights
        .map(highlight => `<li>${highlight}</li>`)
        .join('');

      return `
        <div class="timeline-item">
          <div class="timeline-date">${item.date}</div>
          <div class="timeline-role">${item.role}</div>
          <div class="timeline-company">${item.company}</div>
          <ul class="timeline-list">${highlights}</ul>
        </div>
      `;
    }).join('');
  }

  function renderProjects() {
    const projectsGrid = document.getElementById('projectsGrid');
    if (!projectsGrid) return;

    projectsGrid.innerHTML = portfolioData.projects.map((project, index) => {
      const projectNumber = String(index + 1).padStart(2, '0');
      const linkMarkup = projectLinkLabels
        .filter(([key]) => project.links && project.links[key])
        .map(([key, label]) => `<a class="project-link" href="${project.links[key]}" target="_blank" rel="noopener noreferrer">${label}</a>`)
        .join('');

      const linksSection = linkMarkup ? `<div class="project-links">${linkMarkup}</div>` : '';
      const tagsMarkup = project.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

      return `
        <div class="project-card">
          <div class="project-num">${projectNumber} --</div>
          <div class="project-title">${project.title}</div>
          <div class="project-type">${project.type}</div>
          <p class="project-desc">${project.description}</p>
          ${linksSection}
          <div class="project-tags">${tagsMarkup}</div>
        </div>
      `;
    }).join('');
  }

    const skillsContainer = document.getElementById('technicalSkills');
    if (!skillsContainer) return;

    skillsContainer.innerHTML = portfolioData.technicalSkills.map(skill => `

        <div class="skill-name"><span>${skill.name}</span><span class="skill-pct">${skill.level}%</span></div>
        <div class="skill-track"><div class="skill-fill" data-width="${skill.level}"></div></div>
      </div>
    `).join('');
  }

  // Cursor glow
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  // Intersection Observer for animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        entry.target.querySelectorAll('.skill-fill').forEach(bar => {
          bar.style.width = bar.dataset.width + '%';
        });
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.timeline-item, .project-card, #skills').forEach(el => {
    observer.observe(el);
  });

  // Also trigger skill bars when skills section enters view
  const skillsSection = document.querySelector('#skills');
  const skillObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
      document.querySelectorAll('.skill-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }
  }, { threshold: 0.2 });
  if (skillsSection) skillObserver.observe(skillsSection);

  // Stagger project cards
  document.querySelectorAll('.project-card').forEach((card, i) => {
    card.style.transitionDelay = (i * 0.1) + 's';
  });
